<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>给默默的21岁生日信</title>
    <style>
      :root {
        --bg-a: #fff3f7;
        --bg-b: #f8e7ff;
        --bg-c: #fff9df;
        --paper: rgba(255, 255, 255, 0.82);
        --paper-edge: rgba(255, 180, 204, 0.58);
        --ink: #76515e;
        --title: #d46b91;
        --accent: #f39ab8;
        --accent-deep: #c95f86;
        --soft: rgba(255, 173, 196, 0.36);
        --shadow: rgba(150, 83, 110, 0.16);
      }

      body.dream-blue {
        --bg-a: #eef6ff;
        --bg-b: #f2edff;
        --bg-c: #fff8e9;
        --paper-edge: rgba(147, 176, 235, 0.52);
        --title: #7d83c9;
        --accent: #95a7e9;
        --accent-deep: #646db9;
        --soft: rgba(150, 170, 234, 0.32);
        --shadow: rgba(72, 82, 152, 0.14);
      }

      body.cream-night {
        --bg-a: #fff6df;
        --bg-b: #ffe8ee;
        --bg-c: #f4e7ff;
        --paper-edge: rgba(236, 174, 116, 0.52);
        --title: #c78069;
        --accent: #e8a880;
        --accent-deep: #b76e55;
        --soft: rgba(236, 178, 126, 0.30);
        --shadow: rgba(138, 78, 48, 0.14);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 18% 16%, rgba(255,255,255,.86), transparent 28%),
          radial-gradient(circle at 80% 18%, rgba(255,255,255,.65), transparent 24%),
          linear-gradient(135deg, var(--bg-a), var(--bg-b) 54%, var(--bg-c));
        color: var(--ink);
        font-family: "STKaiti", "KaiTi", "LXGW WenKai", "PingFang SC", "Microsoft YaHei", sans-serif;
        transition: background .55s ease, color .35s ease;
      }

      .card-scene {
        position: relative;
        width: min(94vw, 900px);
        min-height: min(92vh, 760px);
        padding: clamp(54px, 8vw, 82px) clamp(18px, 4vw, 46px) 40px;
        border-radius: 34px;
        isolation: isolate;
      }

      .card-scene::before {
        content: "";
        position: absolute;
        inset: 16px;
        z-index: -2;
        border: 2px dashed rgba(255,255,255,.68);
        border-radius: 32px;
        box-shadow: 0 28px 90px var(--shadow);
        background: rgba(255,255,255,.18);
        backdrop-filter: blur(3px);
      }

      .decor-layer,
      .spark-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .spark-layer { z-index: 8; overflow: hidden; }

      .sticker,
      .doodle-cloud,
      .sleep-moon,
      .pajama-sticker,
      .bow-fallback {
        position: absolute;
        opacity: .78;
        filter: drop-shadow(0 6px 10px var(--shadow));
        user-select: none;
      }

      .sticker { font-size: clamp(24px, 4vw, 42px); color: var(--accent); animation: floaty 4.8s ease-in-out infinite; }
      .heart-a { left: 8%; top: 20%; animation-delay: -.8s; }
      .heart-b { right: 8%; top: 55%; transform: rotate(14deg); }
      .star-a { left: 19%; top: 8%; animation-delay: -1.5s; }
      .star-b { right: 19%; top: 12%; animation-delay: -.2s; }
      .star-c { left: 10%; bottom: 14%; animation-delay: -2.3s; }
      .flower-a { right: 10%; bottom: 16%; animation-delay: -1.1s; }
      .flower-b { left: 20%; bottom: 8%; animation-delay: -.4s; }

      .bow {
        position: absolute;
        width: 72px;
        opacity: .7;
      }
      .bow-a { left: 7%; top: 6%; transform: rotate(-12deg); }
      .bow-b { right: 7%; top: 25%; transform: rotate(13deg); }
      .bow-c { left: 6%; bottom: 22%; transform: rotate(10deg); }
      .bow-d { right: 14%; bottom: 8%; transform: rotate(-9deg); }
      .bow[style*="display: none"] + .bow-fallback { display: block; }

      .bow-fallback {
        width: 68px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(90deg, transparent 0 12%, var(--soft) 12% 44%, transparent 44% 56%, var(--soft) 56% 88%, transparent 88%);
      }
      .bow-fallback::before,
      .bow-fallback::after {
        content: "";
        position: absolute;
        top: 5px;
        width: 28px;
        height: 28px;
        border: 2px solid var(--accent);
        border-radius: 57% 43% 56% 44%;
      }
      .bow-fallback::before { left: 5px; transform: rotate(28deg); }
      .bow-fallback::after { right: 5px; transform: rotate(-28deg); }
      .bow-fallback span {
        position: absolute;
        left: 50%; top: 50%;
        width: 12px; height: 12px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: var(--accent);
      }
      .fallback-a { left: 7%; top: 6%; transform: rotate(-12deg); }
      .fallback-b { right: 7%; top: 25%; transform: rotate(13deg); }
      .fallback-c { left: 6%; bottom: 22%; transform: rotate(10deg); }
      .fallback-d { right: 14%; bottom: 8%; transform: rotate(-9deg); }

      .doodle-cloud {
        width: 92px;
        height: 34px;
        border-radius: 999px;
        background: rgba(255,255,255,.66);
      }
      .doodle-cloud::before,
      .doodle-cloud::after {
        content: "";
        position: absolute;
        bottom: 10px;
        border-radius: 50%;
        background: rgba(255,255,255,.72);
      }
      .doodle-cloud::before { left: 18px; width: 36px; height: 36px; }
      .doodle-cloud::after { right: 18px; width: 30px; height: 30px; }
      .cloud-a { left: 9%; top: 42%; }
      .cloud-b { right: 7%; top: 40%; transform: scale(.82); }

      .sleep-moon {
        width: 54px; height: 54px;
        right: 19%; top: 6%;
        border-radius: 50%;
        box-shadow: -13px 8px 0 2px var(--accent);
        transform: rotate(-16deg);
      }

      .pajama-sticker {
        width: 82px; height: 92px;
        left: 11%; bottom: 5%;
        border: 2px solid var(--accent);
        border-radius: 22px 22px 18px 18px;
        background: rgba(255,255,255,.44);
        transform: rotate(-7deg);
      }
      .pajama-collar {
        position: absolute;
        left: 50%; top: 11px;
        width: 34px; height: 24px;
        transform: translateX(-50%);
        border-left: 2px solid var(--accent);
        border-right: 2px solid var(--accent);
        border-bottom: 2px solid var(--accent);
        border-radius: 0 0 20px 20px;
      }
      .pajama-button {
        position: absolute;
        left: 50%;
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--accent);
        transform: translateX(-50%);
      }
      .button-one { top: 48px; }
      .button-two { top: 65px; }

      .toolbar {
        position: absolute;
        top: 30px;
        right: 34px;
        z-index: 12;
        display: flex;
        gap: 12px;
      }

      .icon-button,
      .seal-button {
        border: 0;
        cursor: pointer;
        color: var(--accent-deep);
        background: rgba(255,255,255,.72);
        box-shadow: 0 12px 28px var(--shadow), inset 0 0 0 1px rgba(255,255,255,.72);
        transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
        -webkit-tap-highlight-color: transparent;
      }

      .icon-button {
        width: 46px; height: 46px;
        border-radius: 50%;
        font-size: 21px;
        display: grid;
        place-items: center;
        position: relative;
      }
      .icon-button::after {
        content: attr(data-tip);
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        white-space: nowrap;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        color: #fff;
        background: var(--accent-deep);
        opacity: 0;
        transform: translateY(-4px);
        pointer-events: none;
        transition: .18s ease;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .icon-button:hover::after,
      .icon-button:focus-visible::after { opacity: .92; transform: translateY(0); }
      .icon-button:hover,
      .seal-button:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 16px 34px var(--shadow); }
      .icon-button:active,
      .seal-button:active { transform: translateY(1px) scale(.96); }
      .icon-button.pulse { animation: buttonPop .36s ease; }

      .letter-wrap {
        position: relative;
        z-index: 3;
        width: min(690px, 100%);
        margin: 0 auto;
      }

      .paper-tape {
        position: absolute;
        top: -15px;
        width: 96px; height: 28px;
        border-radius: 7px;
        background: rgba(255,255,255,.52);
        box-shadow: 0 8px 18px rgba(0,0,0,.05);
        z-index: 5;
      }
      .tape-left { left: 12%; transform: rotate(-8deg); }
      .tape-right { right: 13%; transform: rotate(7deg); }

      .letter-paper {
        position: relative;
        padding: clamp(34px, 6vw, 56px) clamp(26px, 6vw, 62px) clamp(36px, 5vw, 54px);
        border-radius: 30px;
        border: 1px solid var(--paper-edge);
        background:
          linear-gradient(rgba(255,255,255,.72), rgba(255,255,255,.72)),
          repeating-linear-gradient(0deg, transparent 0 34px, rgba(230,145,171,.12) 35px 36px);
        box-shadow: 0 22px 62px var(--shadow);
        backdrop-filter: blur(8px);
        overflow: hidden;
        transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease;
      }
      .letter-paper.glow {
        transform: translateY(-2px);
        box-shadow: 0 26px 76px var(--shadow), 0 0 0 7px var(--soft);
      }

      .paper-doodle {
        position: absolute;
        color: var(--accent);
        opacity: .32;
        font-size: 54px;
      }
      .paper-heart { right: 34px; top: 25px; transform: rotate(12deg); }
      .paper-star { left: 32px; bottom: 25px; transform: rotate(-8deg); }

      .letter-greeting {
        margin: 0 0 8px;
        font-size: clamp(20px, 3vw, 25px);
      }
      .birthday-title {
        margin: 0 0 24px;
        color: var(--title);
        font-size: clamp(34px, 6vw, 58px);
        line-height: 1.04;
        letter-spacing: .04em;
        text-shadow: 0 6px 18px rgba(255,255,255,.9);
      }
      .letter-copy {
        font-size: clamp(18px, 2.6vw, 22px);
        line-height: 1.92;
        letter-spacing: .03em;
      }
      .letter-copy p { margin: 0 0 15px; }
      .letter-sign {
        color: var(--title);
        font-weight: 700;
        font-size: 1.08em;
      }
      .letter-from {
        margin-top: 12px !important;
        text-align: right;
        color: var(--accent-deep);
        font-family: "Comic Sans MS", "Bradley Hand", cursive;
      }

      .seal-button {
        position: absolute;
        right: 26px;
        bottom: 22px;
        width: 52px; height: 52px;
        border-radius: 50%;
        font-size: 24px;
      }

      .spark {
        position: absolute;
        left: var(--x);
        top: var(--y);
        font-size: var(--size);
        color: var(--accent-deep);
        animation: flySpark var(--dur) cubic-bezier(.18,.72,.22,1) forwards;
        transform: translate(-50%, -50%);
        filter: drop-shadow(0 6px 8px var(--shadow));
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 30px;
        z-index: 20;
        padding: 10px 15px;
        border-radius: 999px;
        color: #fff;
        background: var(--accent-deep);
        box-shadow: 0 16px 36px var(--shadow);
        font: 14px/1.4 "PingFang SC", "Microsoft YaHei", sans-serif;
        opacity: 0;
        transform: translate(-50%, 10px);
        transition: .24s ease;
      }
      .toast.show { opacity: .94; transform: translate(-50%, 0); }

      @keyframes floaty {
        0%, 100% { transform: translateY(0) rotate(-4deg); }
        50% { transform: translateY(-13px) rotate(5deg); }
      }
      @keyframes buttonPop {
        0% { transform: scale(1); }
        45% { transform: scale(1.18) rotate(-8deg); }
        100% { transform: scale(1); }
      }
      @keyframes flySpark {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(.45) rotate(0deg); }
        15% { opacity: 1; }
        100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.35) rotate(var(--rot)); }
      }

      @media (max-width: 640px) {
        .card-scene { min-height: 100vh; padding-top: 86px; }
        .toolbar { top: 26px; right: 22px; }
        .icon-button { width: 42px; height: 42px; }
        .letter-copy { line-height: 1.82; }
        .decor-layer { opacity: .72; }
      }
    </style>
  </head>
  <body>
    <main class="card-scene" aria-label="给默默的生日电子贺卡">
      <div class="decor-layer" aria-hidden="true">
        <img class="bow bow-a" src="assets/bow-handdrawn.png" alt="" onerror="this.style.display='none'">
        <span class="bow-fallback fallback-a"><span></span></span>
        <img class="bow bow-b" src="assets/bow-handdrawn.png" alt="" onerror="this.style.display='none'">
        <span class="bow-fallback fallback-b"><span></span></span>
        <img class="bow bow-c" src="assets/bow-handdrawn.png" alt="" onerror="this.style.display='none'">
        <span class="bow-fallback fallback-c"><span></span></span>
        <img class="bow bow-d" src="assets/bow-handdrawn.png" alt="" onerror="this.style.display='none'">
        <span class="bow-fallback fallback-d"><span></span></span>

        <span class="sticker heart heart-a">♡</span>
        <span class="sticker heart heart-b">❤</span>
        <span class="sticker star star-a">✦</span>
        <span class="sticker star star-b">✧</span>
        <span class="sticker star star-c">✦</span>
        <span class="sticker flower flower-a">✿</span>
        <span class="sticker flower flower-b">✽</span>
        <span class="doodle-cloud cloud-a"></span>
        <span class="doodle-cloud cloud-b"></span>
        <span class="sleep-moon"></span>
        <span class="pajama-sticker">
          <span class="pajama-collar"></span>
          <span class="pajama-button button-one"></span>
          <span class="pajama-button button-two"></span>
        </span>
      </div>

      <div class="spark-layer" aria-hidden="true"></div>

      <div class="toolbar" aria-label="贺卡小按钮">
        <button class="icon-button" type="button" data-action="spark" data-tip="撒一点祝福" aria-label="放出小贴纸" title="放出小贴纸">
          <span aria-hidden="true">✦</span>
        </button>
        <button class="icon-button" type="button" data-action="mood" data-tip="切换梦境色调" aria-label="切换梦境色调" title="切换梦境色调">
          <span aria-hidden="true">☾</span>
        </button>
      </div>

      <section class="letter-wrap" aria-label="生日祝福信纸">
        <span class="paper-tape tape-left" aria-hidden="true"></span>
        <span class="paper-tape tape-right" aria-hidden="true"></span>
        <article class="letter-paper">
          <span class="paper-doodle paper-heart" aria-hidden="true">♡</span>
          <span class="paper-doodle paper-star" aria-hidden="true">✦</span>
          <p class="letter-greeting">亲爱的默默：</p>
          <h1 class="birthday-title">21岁生日快乐！</h1>
          <div class="letter-copy">
            <p>希望默默宝贝能够在21岁中，如愿收获喜悦和幸福！哪怕有时遇到一些挑战，有一些压力，也能够在小小紧张之后成功做到！</p>
            <p>今年送给你的礼物是一件舒服的睡衣。愿你每一天都能睡得香香的（与睡衣无关！😜），做很甜很甜的梦~嘻嘻。对我来说，你能够舒服、自然、开心地做自己，就是最重要的事情。</p>
            <p>虽然长大以后，我们都会遇见更多的人，认识新的朋友，可是我还是希望，我们之间的感情永远是与众不同的，是独一无二的，是排在 Top 的！</p>
            <p class="letter-sign">爱你❤！</p>
            <p class="letter-from">From your bestie WYN</p>
          </div>
          <button class="seal-button" type="button" data-action="spark" aria-label="放出祝福贴纸" title="放出祝福贴纸">
            <span aria-hidden="true">♡</span>
          </button>
        </article>
      </section>
    </main>

    <div class="toast" role="status" aria-live="polite"></div>

    <script>
      const scene = document.querySelector('.card-scene');
      const sparkLayer = document.querySelector('.spark-layer');
      const paper = document.querySelector('.letter-paper');
      const toast = document.querySelector('.toast');
      const moods = ['', 'dream-blue', 'cream-night'];
      const moodNames = ['粉色甜梦', '蓝紫月光', '奶油夜晚'];
      let moodIndex = 0;
      let toastTimer;

      function showToast(text) {
        toast.textContent = text;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 1400);
      }

      function buttonPulse(button) {
        button.classList.remove('pulse');
        void button.offsetWidth;
        button.classList.add('pulse');
      }

      function burstSparks(originX, originY, count = 18) {
        const rect = scene.getBoundingClientRect();
        const icons = ['♡', '❤', '✦', '✧', '✿', '☾'];
        for (let i = 0; i < count; i++) {
          const spark = document.createElement('span');
          spark.className = 'spark';
          spark.textContent = icons[Math.floor(Math.random() * icons.length)];
          const angle = Math.random() * Math.PI * 2;
          const radius = 70 + Math.random() * 120;
          spark.style.setProperty('--x', `${originX - rect.left}px`);
          spark.style.setProperty('--y', `${originY - rect.top}px`);
          spark.style.setProperty('--dx', `${Math.cos(angle) * radius}px`);
          spark.style.setProperty('--dy', `${Math.sin(angle) * radius - 40}px`);
          spark.style.setProperty('--rot', `${-90 + Math.random() * 180}deg`);
          spark.style.setProperty('--size', `${17 + Math.random() * 18}px`);
          spark.style.setProperty('--dur', `${900 + Math.random() * 700}ms`);
          sparkLayer.appendChild(spark);
          spark.addEventListener('animationend', () => spark.remove());
        }
        paper.classList.add('glow');
        setTimeout(() => paper.classList.remove('glow'), 850);
      }

      function handleSpark(button) {
        const rect = button.getBoundingClientRect();
        burstSparks(rect.left + rect.width / 2, rect.top + rect.height / 2, button.classList.contains('seal-button') ? 24 : 18);
        showToast(button.classList.contains('seal-button') ? '收到一颗爱心祝福 ♡' : '祝福贴纸已撒出 ✦');
      }

      function handleMood() {
        document.body.classList.remove(...moods.filter(Boolean));
        moodIndex = (moodIndex + 1) % moods.length;
        if (moods[moodIndex]) document.body.classList.add(moods[moodIndex]);
        showToast(`已切换：${moodNames[moodIndex]}`);
      }

      document.addEventListener('click', (event) => {
        const button = event.target.closest('[data-action]');
        if (!button) return;
        buttonPulse(button);
        const action = button.dataset.action;
        if (action === 'spark') handleSpark(button);
        if (action === 'mood') handleMood();
      });

      paper.addEventListener('click', (event) => {
        if (event.target.closest('button')) return;
        burstSparks(event.clientX, event.clientY, 8);
      });
    </script>
  </body>
</html>
