<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>给默默的21岁生日信</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="card-scene" aria-label="给默默的生日电子贺卡">
      <div class="decor-layer" aria-hidden="true">
        <img class="bow bow-a" src="assets/bow-handdrawn.png" alt="">
        <img class="bow bow-b" src="assets/bow-handdrawn.png" alt="">
        <img class="bow bow-c" src="assets/bow-handdrawn.png" alt="">
        <img class="bow bow-d" src="assets/bow-handdrawn.png" alt="">

        <span class="sticker heart heart-a">♡</span>
        <span class="sticker heart heart-b">❤</span>
        <span class="sticker star star-a">✦</span>
        <span class="sticker star star-b">✧</span>
        <span class="sticker star star-c">✦</span>
        <span class="sticker flower flower-a">✿</span>
        <span class="sticker flower flower-b">✽</span>
        <span class="doodle-cloud cloud-a"></span>
        <span class="doodle-cloud cloud-b"></span>
        <span class="sleep-moon"></span>
        <span class="pajama-sticker">
          <span class="pajama-collar"></span>
          <span class="pajama-button button-one"></span>
          <span class="pajama-button button-two"></span>
        </span>
      </div>

      <div class="spark-layer" aria-hidden="true"></div>

      <div class="toolbar" aria-label="贺卡小按钮">
        <button class="icon-button" type="button" data-action="spark" aria-label="放出小贴纸" title="放出小贴纸">
          <span aria-hidden="true">✦</span>
        </button>
        <button class="icon-button" type="button" data-action="mood" aria-label="切换梦境色调" title="切换梦境色调">
          <span aria-hidden="true">☾</span>
        </button>
      </div>

      <section class="letter-wrap" aria-label="生日祝福信纸">
        <span class="paper-tape tape-left" aria-hidden="true"></span>
        <span class="paper-tape tape-right" aria-hidden="true"></span>
        <article class="letter-paper">
          <span class="paper-doodle paper-heart" aria-hidden="true">♡</span>
          <span class="paper-doodle paper-star" aria-hidden="true">✦</span>
          <p class="letter-greeting">亲爱的默默：</p>
          <h1 class="birthday-title">21岁生日快乐！</h1>
          <div class="letter-copy">
            <p>希望默默宝贝能够在21岁中，如愿收获喜悦和幸福！哪怕有时遇到一些挑战，有一些压力，也能够在小小紧张之后成功做到！</p>
            <p>送给你一件舒服的睡衣，愿你每一天都能睡得香香的，做很甜很甜的梦~嘻嘻。对我来说，你能够舒服、自然、开心地做自己，就是最重要的事情。</p>
            <p>虽然长大以后，我们都会遇见更多的人，认识新的朋友，可是我还是希望，我们之间的感情永远是与众不同的，是独一无二的，是排在 Top 的！</p>
            <p class="letter-sign">爱你❤！</p>
            <p class="letter-from">From your bestie WYN</p>
          </div>
          <button class="seal-button" type="button" data-action="spark" aria-label="放出祝福贴纸" title="放出祝福贴纸">
            <span aria-hidden="true">♡</span>
          </button>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
